# ── 随机日常事件 ──
random:
  打嗝事故:
    probability: 5
    text: "嗝！！！（嘉然打嗝了，然后哭了出来）偶像包袱碎了一地……"
    effects: {mood: -15, closeness: 8}
  秃然:
    probability: 3
    text: "嘉然压力太大，突然掉光了头发！！（虽然很快长回来了）"
    effects: {mood: -20, coins: 20}
  平地摔:
    probability: 5
    text: "啊！——然然平地摔了……但是马上站了起来，拍拍衣服说「没事没事」"
