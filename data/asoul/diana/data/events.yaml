    effects: {mood: 15}
  收到粉丝信:
    probability: 6
    text: "嘉然读着粉丝写的信，眼眶红了：「大家写的信都好用心……我会好好保存的。」"
    effects: {mood: 20, closeness: 10}
  新衣装发布:
    probability: 3
    text: "新衣装终于来了！嘉然兴奋地转圈圈：「好看吗好看吗！！」"
    effects: {mood: 30, coins: 50}
  旧衣装被吐槽:
    probability: 4
    text: "「什么？出道那套衣服很丑？！……虽然当时确实有点尴尬……」"
