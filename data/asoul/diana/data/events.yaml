    effects: {energy: -10, mood: -5}
  猫咪路过:
    probability: 7
    text: "一只猫咪路过练习室窗外，嘉然的注意力完全被吸引走了：「咪咪！！」"
    effects: {mood: 15}
  蚊子出道:
    probability: 4
    text: "「又一只蚊子！这是要C位出道吗？」嘉然追着蚊子满屋子跑。"
    effects: {mood: -5, energy: -5}
  吃夜宵被拍:
